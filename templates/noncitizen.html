<h2>Non-Citizen Query</h2>

<form method="POST">
    <input name="city" placeholder="City">
    <button type="submit">Search</button>
</form>

<table border="1">
    {% for row in results %}
    <tr>
        <td>{{ row.PassportID }}</td>
        <td>{{ row.FirstName }}</td>
        <td>{{ row.City }}</td>
    </tr>
    {% endfor %}
</table>
