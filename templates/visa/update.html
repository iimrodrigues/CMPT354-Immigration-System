<!DOCTYPE html>
<html>

<head>
    <title>Visa Update</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <div class="container">

        <h2>Visa Update</h2>

        <form method="POST">

            <div class="row">

                <div style="display:flex; align-items:center; padding:0 10px;">
                    <strong>Update Visa</strong>
                </div>

                <!-- Field to update -->
                <div>
                    <select name="field" id="fieldSelect" onchange="onFieldChange()">
                        <option value="none">Select Field</option>
                        <option value="IssueDate">Issue Date</option>
                        <option value="ExpiryDate">Expiry Date</option>
                        <option value="StayStatus">Stay Status</option>
                    </select>
                </div>
            </div>

            <!-- WHERE: identify which visa -->
            <div class="row">
                <div><strong>Where:</strong></div>

                <div>
                    <label>Passport ID:</label>
                    <input type="text" name="passportID">
                </div>

                <div>
                    <label>Visa ID:</label>
                    <input type="text" name="visaID">
                </div>
            </div>

            <!-- Update To -->
            <div class="row">
                
                <div style="display:flex; align-items:center; padding:0 10px;">
                    <strong>Update To:</strong>
                </div>

                <div id="dateSection" class="hidden">
                    <input type="date" name="dateValue">
                </div>

                <div id="staySection" class="hidden">
                    <select name="stayStatus">
                        <option value="Valid">Valid</option>
                        <option value="Expired">Expired</option>
                        <option value="Revoked">Revoked</option>
                    </select>
                </div>
            </div>

            <button type="submit">Update</button>

        </form>

        {% if message %}
        <div class="row">
            <p><strong>{{ message }}</strong></p>
        </div>
        {% endif %}

        {% if results %}
        <div class="row">
            <table>
                <tr>
                    {% for col in results[0].keys() %}
                    <th>{{ col }}</th>
                    {% endfor %}
                </tr>
                {% for row in results %}
                <tr>
                    {% for val in row.values() %}
                    <td>{{ val }}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </table>
        </div>
        {% endif %}

        <br></br>
        <button onclick="window.location.href='..'">Back to Home Page</button>
        
    </div>

    <script>
        function onFieldChange() {
        const field = document.getElementById("fieldSelect").value;

        document.getElementById("dateSection").classList.add("hidden");
        document.getElementById("staySection").classList.add("hidden");

        if (field === "IssueDate" || field === "ExpiryDate") {
            document.getElementById("dateSection").classList.remove("hidden");
        }

        if (field === "StayStatus") {
            document.getElementById("staySection").classList.remove("hidden");
        }
        }
    </script>

</body>

</html>
