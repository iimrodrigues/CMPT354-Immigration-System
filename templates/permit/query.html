<!DOCTYPE html>
<html>

<head>
    <title>Permit Query</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <div class="container">

        <h2>Permit Query</h2>

        <form method="POST">

            <!-- MAIN QUERY ROW -->
            <div class="row">

                <select id="actionSelect" name="action" onchange="onActionChange()">
                    <option>Find</option>
                    <option>Count</option>
                    <option>Max</option>
                    <option>Min</option>
                </select>

                <div style="display:flex; align-items:center; padding:0 10px;">
                    <strong>Permit</strong>
                </div>

                <select id="fieldSelect" name="field" onchange="updatePermitUI()">
                    <option value="none">N/A</option>
                    <option value="expiry">Expiry Date</option>
                    <option value="issue">Issue Date</option>
                    <option value="type">Type</option>
                    <option value="id">ID</option>
                </select>

            </div>

            <!-- DATE FILTER -->
            <div id="dateSection" class="hidden section">
                <select name="dateCondition">
                    <option>Before</option>
                    <option>On</option>
                    <option>After</option>
                </select>

                <input type="date" name="dateValue">
            </div>

            <!-- TYPE FILTER -->
            <div id="typeSection" class="hidden section">
                <select name="permitType">
                    <option>All</option>
                    <option>Study Permit</option>
                    <option>Work Permit</option>
                </select>
            </div>

            <!-- ID INPUT -->
            <div id="idSection" class="hidden section">
                <input type="text" id="permitID" name="permitID" placeholder="Enter 10-character ID" maxlength="10">
            </div>

            <button type="submit">Search</button>

        </form>

    <div class="table-container">
        {% if results %}

        <table class="result-table">

            <thead>
                <tr>
                    {% for key in results[0].keys() %}
                    <th>{{ key }}</th>
                    {% endfor %}
                </tr>
            </thead>

            <tbody>
                {% for row in results %}
                <tr>
                    {% for value in row.values() %}
                    <td>{{ value }}</td>
                    {% endfor %}
                </tr>
                {% endfor %}
            </tbody>

        </table>
        {% else %}
            <p>No data found matching your query.</p>

        {% endif %}
    </div>
      
      <br></br>
        <button onclick="window.location.href='..'">Back to Home Page</button>
  
</div>

    <script>
        function updatePermitUI() {
            const field = document.getElementById("fieldSelect").value;
            const action = document.getElementById("actionSelect").value;

            document.getElementById("dateSection").classList.add("hidden");
            document.getElementById("typeSection").classList.add("hidden");
            document.getElementById("idSection").classList.add("hidden");

            if (field === "expiry" || field === "issue") {
                if (action != "Max" && action != "Min") {
                    document.getElementById("dateSection").classList.remove("hidden");
                }
            }

            if (field === "type") {
                document.getElementById("typeSection").classList.remove("hidden");
            }

            if (field === "id") {
                document.getElementById("idSection").classList.remove("hidden");
            }
        }

        function resetAllConditional() {
            // hide all sections
            document.getElementById("dateSection").classList.add("hidden");
            document.getElementById("typeSection").classList.add("hidden");
            document.getElementById("idSection").classList.add("hidden");

            // reset inputs inside them
            document.querySelectorAll("#dateSection input, #dateSection select")
                .forEach(el => el.value = "");

            document.querySelectorAll("#typeSection select")
                .forEach(el => el.selectedIndex = 0);

            document.querySelectorAll("#idSection input")
                .forEach(el => el.value = "");
        }

        function onActionChange() {
            const action = document.getElementById("actionSelect").value;
            const field = document.getElementById("fieldSelect");

            resetAllConditional();
            field.value = "none";

            for (let option of field.options) {
                option.hidden = false;
            }

            applyRules(action);
        }

        function applyRules(action) {
            const field = document.getElementById("fieldSelect");

            const isAggregate = (action === "Max" || action === "Min");

            if (isAggregate) {
                for (let option of field.options) {
                    if (option.value === "type" || option.value === "id" || option.value === "none") {
                        option.hidden = true;
                    }
                }
            }
        }
    </script>

</body>

</html>
