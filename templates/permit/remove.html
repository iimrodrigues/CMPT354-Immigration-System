<!DOCTYPE html>
<html>

<head>
    <title>Permit Remove</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>

<body>

    <div class="container">

        <h2>Permit Remove</h2>

        <form method="POST">

            <div class="row">
                <div style="display:flex; align-items:center; padding:0 10px;">
                    <strong>Permit ID</strong>
                </div>
            </div>

            <!-- ID INPUT -->
            <div id="idSection">
                <input type="text" id="permit" name="permitID" placeholder="Enter 10-character permit ID" maxlength="10">
            </div>

            <button type="submit">Remove</button>

        </form>

    </div>

</body>

</html>
